<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1c1c1e">
<link rel="manifest" href="manifest.json">
<title>栄ガーデン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100%;
  font-family:'Noto Sans JP','Inter',sans-serif;
  background:#e8e0d0;
  color:#1c1c1e;
  overflow-x:hidden;
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
}

/* ── ヘッダー ── */
.header{
  background:#1c1c1e;
  color:#fff;
  text-align:center;
  padding:44px 16px 20px;
  position:relative;
}
.header::after{
  content:'';position:absolute;bottom:0;left:10%;right:10%;
  height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);
}

/* ロゴ行 */
.logo-row{
  display:flex;align-items:center;justify-content:center;gap:14px;
  margin-bottom:20px;
}
.logo-svg{
  width:48px;height:48px;flex-shrink:0;
  filter:drop-shadow(0 0 8px rgba(46,204,113,.3));
}
.logo-info{text-align:left}
.logo-name{font-size:22px;font-weight:700;letter-spacing:2px;line-height:1.2}
.logo-sub{
  font-family:'Inter',sans-serif;
  font-size:11px;font-weight:600;
  color:rgba(255,255,255,.4);
  letter-spacing:2px;text-transform:uppercase;
}

/* 時計 */
.clock-area{margin-top:4px}
.clock-date{
  font-family:'Inter','Noto Sans JP',sans-serif;
  font-size:16px;font-weight:600;
  color:rgba(255,255,255,.7);
  letter-spacing:1px;
  margin-bottom:4px;
}
.clock-divider{
  width:40px;height:1px;margin:6px auto;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);
}
.clock-time{
  font-family:'Inter',sans-serif;
  font-size:36px;font-weight:700;
  color:#fff;
  letter-spacing:4px;
  line-height:1;
}

/* ── グリッド ── */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  max-width:400px;
  margin:0 auto;
  padding:24px 20px 40px;
}

/* ── アプリカード ── */
.app{
  text-decoration:none;color:#1c1c1e;
  position:relative;overflow:hidden;
  border-radius:20px;
  background:#fff;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
  padding:24px 12px 16px;
  text-align:center;
  transition:transform .18s,box-shadow .25s;
}
.app:hover,.app:focus{
  transform:translateY(-3px);
  box-shadow:0 6px 20px rgba(0,0,0,.13);
}
.app:active{transform:scale(.95)}

/* 絵文字背景丸 */
.app .icon-wrap{
  width:64px;height:64px;
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 10px;
}
.app[data-color="green"] .icon-wrap{background:#2d7a4f}
.app[data-color="blue"] .icon-wrap{background:#1a5fa8}
.app[data-color="orange"] .icon-wrap{background:#e65100}
.app[data-color="purple"] .icon-wrap{background:#7b1fa2}
.app[data-color="red"] .icon-wrap{background:#c0392b}

.app .icon{
  font-size:32px;line-height:1;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,.2));
}
.app .name{
  font-size:13px;font-weight:600;
  line-height:1.4;
  color:#1c1c1e;
}

/* リップル */
.ripple{
  position:absolute;border-radius:50%;
  background:rgba(0,0,0,.1);
  transform:scale(0);animation:ripple-anim .5s ease-out;
  pointer-events:none;
}
@keyframes ripple-anim{to{transform:scale(3);opacity:0}}

/* 準備中オーバーレイ */
.app.wip .overlay{
  position:absolute;inset:0;border-radius:20px;
  background:rgba(255,255,255,.7);
  display:flex;align-items:center;justify-content:center;
}
.app.wip .overlay span{
  font-size:11px;font-weight:700;
  background:#888;color:#fff;
  padding:4px 12px;border-radius:20px;
  letter-spacing:1px;
}

/* トースト */
.toast{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;justify-content:center;
  padding:0 20px 28px;
  pointer-events:none;z-index:200;
}
.toast-inner{
  background:#1c1c1e;
  color:#fff;padding:12px 24px;border-radius:12px;
  font-size:14px;font-weight:500;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
  transform:translateY(80px);opacity:0;
  transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s;
}
.toast-inner.show{transform:translateY(0);opacity:1}

/* フッター */
.footer{
  text-align:center;padding:0 20px 24px;
  font-size:11px;color:rgba(0,0,0,.25);
  font-family:'Inter',sans-serif;letter-spacing:.5px;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo-row">
    <img class="logo-svg" src="logo.png" alt="栄ガーデン ロゴ">
    <div class="logo-info">
      <div class="logo-name">栄ガーデン</div>
      <div class="logo-sub">Sakae Garden</div>
    </div>
  </div>
  <div class="clock-area">
    <div class="clock-date" id="clock-date"></div>
    <div class="clock-divider"></div>
    <div class="clock-time" id="clock-time"></div>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="footer">&copy; 2026 SAKAE GARDEN</div>

<div class="toast"><div class="toast-inner" id="toast"></div></div>

<script>
const APPS = [
  { emoji:'🚚', name:'配達日報',       url:'https://sakae-garden.github.io/nippo/',                color:'green'  },
  { emoji:'📊', name:'日報サマリー',   url:'https://sakae-garden.github.io/nippo/summary.html',    color:'blue'   },
  { emoji:'📦', name:'卸販売先入力',   url:'https://sakae-garden.github.io/oroshi.html',           color:'orange' },
  { emoji:'🌱', name:'日次作業入力',   url:'https://sakae-garden.github.io/harvest/employee.html', color:'purple', wip:true },
  { emoji:'📈', name:'収穫予測',       url:'https://sakae-garden.github.io/harvest/owner.html',    color:'red',   wip:true },
];

const grid = document.getElementById('grid');
APPS.forEach(app => {
  const a = document.createElement('a');
  a.href = app.wip ? '#' : app.url;
  a.className = 'app' + (app.wip ? ' wip' : '');
  a.dataset.color = app.color;
  a.innerHTML =
    `<div class="icon-wrap"><span class="icon">${app.emoji}</span></div>` +
    `<span class="name">${app.name}</span>` +
    (app.wip ? '<div class="overlay"><span>準備中</span></div>' : '');

  a.addEventListener('click', function(e) {
    const rect = a.getBoundingClientRect();
    const r = document.createElement('span');
    r.className = 'ripple';
    const size = Math.max(rect.width, rect.height) * 2;
    r.style.width = r.style.height = size + 'px';
    r.style.left = (e.clientX - rect.left - size/2) + 'px';
    r.style.top = (e.clientY - rect.top - size/2) + 'px';
    a.appendChild(r);
    setTimeout(() => r.remove(), 500);
    if (app.wip) {
      e.preventDefault();
      showToast('このアプリは現在準備中です');
    }
  });
  grid.appendChild(a);
});

function updateClock() {
  const now = new Date();
  const y = now.getFullYear();
  const mo = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const wd = ['日','月','火','水','木','金','土'][now.getDay()];
  const h = String(now.getHours()).padStart(2,'0');
  const mi = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock-date').textContent = `${y}.${mo}.${d} (${wd})`;
  document.getElementById('clock-time').textContent = `${h}:${mi}`;
}
updateClock();
setInterval(updateClock, 10000);

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
