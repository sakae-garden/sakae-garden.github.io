<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a1628">
<link rel="manifest" href="manifest.json">
<title>栄ガーデン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-start: #0a1628;
  --bg-end: #000;
  --glass: rgba(255,255,255,0.07);
  --glass-border: rgba(255,255,255,0.12);
  --glass-hover: rgba(255,255,255,0.13);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100%;
  font-family:'Noto Sans JP','Inter',sans-serif;
  background:linear-gradient(170deg,var(--bg-start) 0%,#0d2818 45%,var(--bg-end) 100%);
  color:#fff;
  overflow-x:hidden;
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
}

/* ── ヘッダー ── */
.header{
  text-align:center;
  padding:48px 16px 12px;
  position:relative;
}
.header::after{
  content:'';position:absolute;bottom:0;left:10%;right:10%;
  height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
}
.logo-row{
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:10px;
}
.logo-emoji{font-size:36px;filter:drop-shadow(0 0 12px rgba(120,200,120,.4))}
.logo-text{font-size:24px;font-weight:700;letter-spacing:3px}
.clock{
  font-family:'Inter','Noto Sans JP',sans-serif;
  font-size:13px;font-weight:600;
  color:rgba(255,255,255,.45);
  letter-spacing:1.5px;
}

/* ── グリッド ── */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  max-width:400px;
  margin:0 auto;
  padding:28px 20px 40px;
}

/* ── アプリカード ── */
.app{
  text-decoration:none;color:#fff;
  position:relative;overflow:hidden;
  border-radius:24px;
  background:var(--glass);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:24px 12px 18px;
  text-align:center;
  transition:transform .18s,background .25s,box-shadow .25s;
}
.app::before{
  content:'';position:absolute;inset:0;border-radius:24px;
  opacity:0;transition:opacity .3s;
  pointer-events:none;
}
.app:active{transform:scale(.94)}
.app:hover,.app:focus{
  background:var(--glass-hover);
  box-shadow:0 0 30px rgba(255,255,255,.06);
}
/* カラーグロー */
.app[data-color="green"]::before{background:radial-gradient(circle at 50% 30%,rgba(45,122,79,.35),transparent 70%)}
.app[data-color="blue"]::before{background:radial-gradient(circle at 50% 30%,rgba(26,95,168,.35),transparent 70%)}
.app[data-color="orange"]::before{background:radial-gradient(circle at 50% 30%,rgba(230,81,0,.3),transparent 70%)}
.app[data-color="purple"]::before{background:radial-gradient(circle at 50% 30%,rgba(123,31,162,.3),transparent 70%)}
.app[data-color="red"]::before{background:radial-gradient(circle at 50% 30%,rgba(192,57,43,.3),transparent 70%)}
.app:hover::before,.app:active::before{opacity:1}

/* アイコン */
.app .icon{
  font-size:52px;line-height:1;
  display:block;margin-bottom:10px;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,.3));
  transition:transform .2s;
}
.app:active .icon{transform:scale(1.1)}
.app .name{
  font-size:13px;font-weight:600;
  opacity:.92;line-height:1.4;
}

/* リップル */
.ripple{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,.25);
  transform:scale(0);animation:ripple-anim .5s ease-out;
  pointer-events:none;
}
@keyframes ripple-anim{to{transform:scale(3);opacity:0}}

/* 準備中オーバーレイ */
.app.wip{pointer-events:auto}
.app.wip .overlay{
  position:absolute;inset:0;border-radius:24px;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
  display:flex;align-items:center;justify-content:center;
}
.app.wip .overlay span{
  font-size:11px;font-weight:700;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.2);
  padding:4px 12px;border-radius:20px;
  letter-spacing:1px;
}

/* トースト */
.toast{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;justify-content:center;
  padding:0 20px 28px;
  pointer-events:none;z-index:200;
}
.toast-inner{
  background:rgba(30,30,30,.92);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.1);
  color:#fff;padding:12px 24px;border-radius:14px;
  font-size:14px;font-weight:500;
  transform:translateY(80px);opacity:0;
  transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s;
}
.toast-inner.show{transform:translateY(0);opacity:1}

/* フッター */
.footer{
  text-align:center;padding:0 20px 24px;
  font-size:11px;color:rgba(255,255,255,.2);
  font-family:'Inter',sans-serif;letter-spacing:.5px;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo-row">
    <span class="logo-emoji">🍄</span>
    <span class="logo-text">栄ガーデン</span>
  </div>
  <div class="clock" id="clock"></div>
</div>

<div class="grid" id="grid"></div>

<div class="footer">&copy; 2026 SAKAE GARDEN</div>

<div class="toast"><div class="toast-inner" id="toast"></div></div>

<script>
// ── アプリ定義 ──
const APPS = [
  { emoji:'🚚', name:'配達日報',       url:'https://sakae-garden.github.io/nippo/',                color:'green'  },
  { emoji:'📊', name:'日報サマリー',   url:'https://sakae-garden.github.io/nippo/summary.html',    color:'blue'   },
  { emoji:'📦', name:'卸販売先入力',   url:'oroshi.html',                                          color:'orange' },
  { emoji:'🌱', name:'日次作業入力',   url:'https://sakae-garden.github.io/harvest/employee.html', color:'purple', wip:true },
  { emoji:'📈', name:'収穫予測',       url:'https://sakae-garden.github.io/harvest/owner.html',    color:'red',   wip:true },
];

// ── グリッド描画 ──
const grid = document.getElementById('grid');
APPS.forEach(app => {
  const a = document.createElement('a');
  a.href = app.wip ? '#' : app.url;
  a.className = 'app' + (app.wip ? ' wip' : '');
  a.dataset.color = app.color;
  a.innerHTML =
    `<span class="icon">${app.emoji}</span>` +
    `<span class="name">${app.name}</span>` +
    (app.wip ? '<div class="overlay"><span>準備中</span></div>' : '');

  a.addEventListener('click', function(e) {
    // リップル
    const rect = a.getBoundingClientRect();
    const r = document.createElement('span');
    r.className = 'ripple';
    const size = Math.max(rect.width, rect.height) * 2;
    r.style.width = r.style.height = size + 'px';
    r.style.left = (e.clientX - rect.left - size/2) + 'px';
    r.style.top = (e.clientY - rect.top - size/2) + 'px';
    a.appendChild(r);
    setTimeout(() => r.remove(), 500);

    if (app.wip) {
      e.preventDefault();
      showToast('このアプリは現在準備中です');
    }
  });

  grid.appendChild(a);
});

// ── 時計 ──
function updateClock() {
  const now = new Date();
  const y = now.getFullYear();
  const mo = now.getMonth() + 1;
  const d = now.getDate();
  const wd = ['日','月','火','水','木','金','土'][now.getDay()];
  const h = String(now.getHours()).padStart(2,'0');
  const mi = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent =
    `${y}.${String(mo).padStart(2,'0')}.${String(d).padStart(2,'0')} (${wd})  ${h}:${mi}`;
}
updateClock();
setInterval(updateClock, 10000);

// ── トースト ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
